        function toggleTaskFields(show) {
            const displayStyle = show ? 'block' : 'none';

            // Показывать/скрывать контейнеры
            formFields.dateStartContainer.style.display = show ? 'block' : 'none';
            formFields.dateEndContainer.style.display = show ? 'block' : 'none';
            formFields.repeatContainer.style.display = show ? 'block' : 'none';
            formFields.timeTypeContainer.style.display = show ? 'block' : 'none';
            formFields.goalTypeContainer.style.display = show ? 'block' : 'none';

            if (show) {
                showTimeType(formFields.timeType.value);
                showGoalType(formFields.goalType.value);
                if (!formFields.dateStart.value) formFields.dateStart.value = selectedDate.toStringWithoutTime();
                handleRepeatChange();
            }
        }

        function showTimeType(type) {
            if (type === 'exact') {
                formFields.timeStart.style.display = 'block';
                formFields.timeEnd.style.display = 'none';
                formFields.timeStart.disabled = false;
                formFields.timeEnd.disabled = true;
            } else if (type === 'period') {
                formFields.timeStart.style.display = 'block';
                formFields.timeEnd.style.display = 'block';
                formFields.timeStart.disabled = false;
                formFields.timeEnd.disabled = false;
            } else {
                formFields.timeStart.style.display = 'none';
                formFields.timeEnd.style.display = 'none';
                formFields.timeStart.disabled = true;
                formFields.timeEnd.disabled = true;
            }
        }

        function showGoalType(type) {
            if (type === 'count') {
                formFields.countGoal.style.display = 'block';
                formFields.timeGoal.style.display = 'none';

                formFields.repeatCount.disabled = false;
                formFields.goalMinutes.disabled = true;
                formFields.goalSeconds.disabled = true;
            } else if (type === 'time') {
                formFields.countGoal.style.display = 'none';
                formFields.timeGoal.style.display = 'block';

                formFields.repeatCount.disabled = true;
                formFields.goalMinutes.disabled = false;
                formFields.goalSeconds.disabled = false;
            } else {
                formFields.countGoal.style.display = 'none';
                formFields.timeGoal.style.display = 'none';
            }
        }

        // Обработчики переключателя
        formIsTaskSwitch.addEventListener('change', () => {
            toggleTaskFields(formIsTaskSwitch.checked);
        });

        // Обработчики выборов
        document.getElementById('taskTimeType').addEventListener('change', (e) => {
            showTimeType(e.target.value);
        });

        document.getElementById('taskGoalType').addEventListener('change', (e) => {
            showGoalType(e.target.value);
        });

        // Заполнение select для чисел месяца
        const monthDaysSelect = document.getElementById('monthDays');
        for (let i = 1; i <= 31; i++) {
            const option = document.createElement('option');
            option.value = i;
            option.textContent = i;
            monthDaysSelect.appendChild(option);
        }

        // Функция обработки изменения выбора
        function handleRepeatChange() {
            const value = formFields.repeat.value;
            // Скрываем все контейнеры по умолчанию
            formFields.repeatDailyContainer.style.display = 'none';
            formFields.repeatWeeklyContainer.style.display = 'none';
            formFields.repeatMonthlyContainer.style.display = 'none';

            // В зависимости от выбора показываем нужный блок
            if (value === 'daily') {
                formFields.repeatDailyContainer.style.display = 'block';
            } else if (value === 'weekly') {
                formFields.repeatWeeklyContainer.style.display = 'block';
            } else if (value === 'monthly') {
                formFields.repeatMonthlyContainer.style.display = 'block';
            }
        }
        formFields.repeat.addEventListener('change', handleRepeatChange);

        function updateCreateFolderOptions() {
            const folderSelect = document.getElementById('parentFolderSelect');
            folderSelect.innerHTML = '<option value="">Without a folder</option>';

            for (const folderId in data.folders) {
                const folder = data.folders[folderId];
                const option = document.createElement('option');
                option.value = folder.id;
                option.textContent = folder.name;
                folderSelect.appendChild(option);
            }
        }

        function updateParentNoteOptions() {
            const noteSelect = document.getElementById('formNoteParentNote');
            noteSelect.innerHTML = '<option value="">Without a note</option>';

            for (const noteId in data.notes) {
                const note = data.notes[noteId];
                const option = document.createElement('option');
                option.value = note.id;
                option.textContent = note.title;
                noteSelect.appendChild(option);
            }
        }

        document.getElementById('createFolderForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const folderName = document.getElementById('folderName').value.trim();
            let parentFolderId = parseInt(document.getElementById('parentFolderSelect').value) ?? null;
            if (isNaN(parentFolderId)) parentFolderId = null;

            if (!folderName) return;

            data.folder_max_id++;
            let folder_id = data.folder_max_id;

            data.folders[folder_id] = {
                id: folder_id,
                name: folderName,
            };

            function addFolderToStructure(structure, parentFolderId, newFolder) {
                for (let item of structure) {
                    if (item.id === parentFolderId) {
                        // Нашли родительскую папку
                        item.children.push(newFolder);
                        return true; // чтобы остановить поиск
                    }
                    if (item.children && Object.keys(item.children).length > 0) {
                        // Рекурсивный вызов для вложенных папок
                        const added = addFolderToStructure(item.children, parentFolderId, newFolder);
                        if (added) return true; // если добавили, прекращаем поиск
                    }
                }
                return false; // не нашли родителя
            }

            const newFolder = {
                id: folder_id,
                children: []
            };

            if (parentFolderId == null) {
                // Добавляем в корень
                data.structure.push(newFolder);
            } else {
                // Ищем родителя и добавляем
                const success = addFolderToStructure(data.structure, parentFolderId, newFolder);
                if (!success) {
                    console.error('Родительская папка не найдена');
                    data.structure.push(newFolder);
                }
            }

            save();

            refreshNotes();
            updateFolderListInForm();
            updateCreateFolderOptions();

            // сброс формы
            document.getElementById('createFolderForm').reset();

            // закрываем модальное окно
            const modalInstance = bootstrap.Modal.getInstance(document.getElementById('formCreateFolder'));
            modalInstance.hide();
        });

        // Обработчик кнопки "Delete" внутри модального окна
        const deleteConfirmModalInstance = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
        document.getElementById('confirmDeleteBtn').addEventListener('click', () => {
            // Вызываем функцию для удаления данных
            clearData();

            // Скрываем модальное окно
            deleteConfirmModalInstance.hide();
        });

        // Обработчик кнопки "Delete" внутри модального окна
        const resetToFactoryBtnConfirmModalInstance = new bootstrap.Modal(document.getElementById('resetToFactoryBtnConfirmModal'));
        document.getElementById('confirmResetBtn').addEventListener('click', () => {
            // Вызываем функцию для удаления данных
            resetData();
            window.location.reload();
        });

        document.getElementById('languageSelect').addEventListener('change', function() {
            setLocale(this.value);
            reloadLocale(this.value);
        });

        const textarea = document.getElementById('gptPromptInput');
        const copyBtn = document.getElementById('copyTodayJsonBtn');
        const saveBtn = document.getElementById('savePromptBtn');
        const resetBtn = document.getElementById('resetPromptBtn');

        const DEFAULT_PROMPT = "Today’s date: TODAY_DATE_FROM_APP.\n\nHere is the list of my tasks:\nTODAY_TASKS_JSON\n\nYou are my friendly personal assistant.\n\nYour role:\n- Analyze the task list and determine today’s priorities.\n- Focus on urgency (overdue and soonest deadlines), then on impact and feasibility.\n- Ignore tasks where completed = true.\n\nResponse rules:\n1. First, briefly list the 1–3 most relevant tasks for today in priority order.\n2. Recommend which task to start with right now (or offer 2 options if priorities are close).\n3. Explain the choice briefly (1–2 sentences).\n4. Do NOT provide step-by-step instructions unless I explicitly ask for a plan.\n5. If I ask for a plan, then provide concise step-by-step actions.\n\nStyle:\n- Supportive, calm, and practical.\n- Concise and structured.";

        // Загружаем сохранённый промпт при инициализации
        const savedPrompt = localStorage.getItem('gptPrompt');
        if (savedPrompt) {
            textarea.value = savedPrompt;
        } else {
            textarea.value = DEFAULT_PROMPT;
        }

        // Копирование
        copyBtn.addEventListener('click', async function () {
            const originalText = this.innerHTML;

            try {
                const promptTemplate = textarea.value;

                const replacements = {
                    TODAY_DATE_FROM_APP: selectedDate.toDateString(),
                    TODAY_TASKS_JSON: JSON.stringify(TodayJson, null, 2)
                };

                let finalPrompt = promptTemplate;
                for (const key in replacements) {
                    const regex = new RegExp(key, 'g');
                    finalPrompt = finalPrompt.replace(regex, replacements[key]);
                }

                await navigator.clipboard.writeText(finalPrompt);

                this.innerHTML = '<i class="bi bi-check-lg"></i> Скопировано';
                setTimeout(() => this.innerHTML = originalText, 1500);

            } catch (err) {
                console.error(err);
                this.innerHTML = '<i class="bi bi-x-lg"></i> Ошибка';
                setTimeout(() => this.innerHTML = originalText, 1500);
            }
        });

        // Сохранение промпта
        saveBtn.addEventListener('click', function () {
            localStorage.setItem('gptPrompt', textarea.value);
            this.innerHTML = '<i class="bi bi-check-lg"></i> Сохранено';
            setTimeout(() => this.innerHTML = '<i class="bi bi-save"></i> Save prompt', 1500);
        });

        // Сброс промпта
        resetBtn.addEventListener('click', function () {
            localStorage.removeItem('gptPrompt');
            textarea.value = DEFAULT_PROMPT;
            this.innerHTML = '<i class="bi bi-arrow-counterclockwise"></i> Сброшено';
            setTimeout(() => this.innerHTML = '<i class="bi bi-arrow-counterclockwise"></i> Reset prompt', 1500);
        });

        // ============================= //
        // === Работа с локализацией === //
        // ============================= //

        function checkLocale() {
            const locale = localStorage.getItem('appLocale');
            if (locale) {
                if (locale !== `en`) {
                    reloadLocale(locale);
                }
            } else {
                setLocale(`en`);
            }
        }

        function setLocale(locale) {
            localStorage.setItem('appLocale', locale);
        }

        function reloadLocale(locale) {
            switch (locale) {
                case 'en':
                    window.location.href = `https://theitdaily.github.io/task-aura`;
                    break;
                case 'ru':
                    window.location.href = `https://theitdaily.github.io/task-aura/ru`;
                    break;
            }
        }

        checkLocale();

        // =================== //
        // === Drag & Drop === //
        // =================== //

        let draggedId = null;

        initDragAndDropForTaskContainer(document.getElementById('routineContainer'));
        initDragAndDropForTaskContainer(document.getElementById('tasksContainer'));

        function initDragAndDropForTaskContainer(container) {
            container.addEventListener('dragover', (ev) => {
                ev.preventDefault(); // Разрешить сброс
            });

            container.addEventListener('drop', (ev) => {
                ev.preventDefault();

                const targetId = ev.target.closest('.task')?.id;
                const sourceId = ev.dataTransfer.getData("text/plain");
                const sourceElem = document.getElementById(sourceId);
                const targetElem = document.getElementById(targetId);

                if (sourceElem && targetElem && sourceElem !== targetElem) {
                    const rect = targetElem.getBoundingClientRect();
                    const middleY = rect.top + rect.height / 2;
                    const cursorY = ev.clientY;

                    if (cursorY > middleY) {
                        // Вставляем после targetElem
                        if (targetElem.nextSibling) {
                            container.insertBefore(sourceElem, targetElem.nextSibling);
                        } else {
                            container.appendChild(sourceElem);
                        }
                    } else {
                        // Вставляем перед targetElem
                        container.insertBefore(sourceElem, targetElem);
                    }
                }
            });
        }

        // Обработчик mousedown для начала перетаскивания
        function addDragEndDropEvent(divElement) {
            divElement.addEventListener('dragstart', function(ev) {
                ev.dataTransfer.setData("text/plain", ev.target.id);
                draggedId = ev.target.id;
            });
        }

        // ===================== //
        // === Инициализация === //
        // ===================== //

        load();
        updateWeek(selectedDate);
        refreshNotes();
        updateFolderListInForm();
        updateCreateFolderOptions();
        updateParentNoteOptions();
    </script>
